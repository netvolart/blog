baseURL                = "https://artemvolkov.com/"
locale                 = "en-us"
defaultContentLanguage = "en"
title                  = "Artem Volkov"

enableRobotsTXT = true
enableEmoji     = true
buildDrafts     = false
buildFuture     = false
buildExpired    = false

[pagination]
  pagerSize = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup.highlight]
  noClasses = false
  codeFences = true
  guessSyntax = true
  style = "github-dark"

[module]
  [[module.imports]]
    path = "github.com/adityatelange/hugo-PaperMod"

[params]
  env         = "production"
  title       = "Artem Volkov"
  author      = "Artem Volkov"
  description = "Personal blog of Artem Volkov — Platform Engineering, Cloud, AI"
  keywords    = ["blog", "platform engineering", "cloud", "ai", "devops", "sre"]

  defaultTheme       = "dark"
  disableThemeToggle = false

  ShowReadingTime               = true
  ShowShareButtons              = false
  ShowPostNavLinks              = true
  ShowBreadCrumbs               = true
  ShowCodeCopyButtons           = true
  ShowWordCount                 = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc                    = true
  disableSpecial1stPost         = false
  disableScrollToTop            = false
  comments                      = false

  [params.homeInfoParams]
    Title   = "Hi, I'm Artem 👋"
    Content = """
Platform Engineering • Cloud • AI

I write about building and running modern platforms infrastructure — AWS, Terraform, automation, backend and the AI tooling reshaping the way we ship software.
"""

  [[params.socialIcons]]
    name = "github"
    url  = "https://github.com/netvolart/"
  [[params.socialIcons]]
    name = "linkedin"
    url  = "https://www.linkedin.com/in/volk0vartem/"
  [[params.socialIcons]]
    name = "rss"
    url  = "/index.xml"

  [params.assets]
    favicon          = "/favicon.svg"
    favicon16x16     = "/favicon-32.png"
    favicon32x32     = "/favicon-32.png"
    apple_touch_icon = "/favicon-256.png"
    safari_pinned_tab = "/favicon.svg"

  [params.label]
    text = "Platform Engineering | DevEx | AI"
    icon = "/images/avatar.svg"
    iconHeight = 32

  [params.cover]
    hidden       = false
    hiddenInList = false
    hiddenInSingle = false

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort      = true
    location        = 0
    distance        = 1000
    threshold       = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[menu]
  [[menu.main]]
    identifier = "posts"
    name       = "Posts"
    url        = "/posts/"
    weight     = 10
  [[menu.main]]
    identifier = "categories"
    name       = "Categories"
    url        = "/categories/"
    weight     = 20
  [[menu.main]]
    identifier = "tags"
    name       = "Tags"
    url        = "/tags/"
    weight     = 30
  [[menu.main]]
    identifier = "about"
    name       = "About"
    url        = "/about/"
    weight     = 40
  [[menu.main]]
    identifier = "search"
    name       = "Search"
    url        = "/search/"
    weight     = 50
