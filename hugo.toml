baseURL                = "https://artemvolkov.com/"
locale                 = "en"
defaultContentLanguage = "en"
title                  = "Artem Volkov"

enableRobotsTXT = true
enableEmoji     = true

[pagination]
  pagerSize = 10

[markup.highlight]
  style     = "github-dark"
  noClasses = false

[params]
  author      = "Artem Volkov"
  description = "Personal blog of Artem Volkov"
  keywords    = "blog, devops, cloud, sre, terraform, aws"
  info        = ["DevOps / Cloud Engineer"]
  avatarURL  = "/images/avatar.svg"
  faviconSVG = "/favicon.svg"
  favicon_32 = "/favicon-32.png"
  favicon_16 = "/favicon-32.png"
  touchicon  = "/favicon-256.png"
  mask_icon  = "/favicon.svg"
  manifest   = "/site.webmanifest"
  dateFormat  = "January 2, 2006"
  since       = 2026
  hideFooter    = false
  hideCredits   = false
  hideCopyright = false
  customCSS  = []
  customSCSS = []
  customJS   = []

  [params.opengraph]
    image = "images/og-cover.png"

[[params.social]]
  name   = "Github"
  icon   = "fa-brands fa-github fa-2x"
  weight = 1
  url    = "https://github.com/netvolart/"

[[params.social]]
  name   = "LinkedIn"
  icon   = "fa-brands fa-linkedin fa-2x"
  weight = 2
  url    = "https://www.linkedin.com/in/artem-volkov/"

[[params.social]]
  name   = "RSS"
  icon   = "fa-solid fa-rss fa-2x"
  weight = 3
  rel    = "alternate"
  type   = "application/rss+xml"
  url    = "index.xml"

[menu]
  [[menu.main]]
    name   = "Posts"
    weight = 1
    url    = "posts/"
  [[menu.main]]
    name   = "About"
    weight = 2
    url    = "about/"

[module]
  [[module.imports]]
    path = "github.com/luizdepra/hugo-coder"
