<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <title>Platform Engineering blog logo</title>
  <desc>Stacked platform layers with orange and teal accents and a vertical pin connector</desc>

  <!-- Background -->
  <rect x="0" y="0" width="1024" height="1024" rx="180" fill="#0F1419"/>

  <!-- Layers group, centered at 512,512 -->
  <g transform="translate(512,512)" stroke-linecap="round" stroke-linejoin="round">

    <!-- Layer 1 (top) — DEV EXPERIENCE — orange filled -->
    <rect x="-280" y="-260" width="560" height="96" rx="18"
          fill="#F97316" stroke="#F97316" stroke-width="22"/>

    <!-- Layer 2 — RUNTIME — outline cream -->
    <rect x="-280" y="-130" width="560" height="96" rx="18"
          fill="none" stroke="#E8E6E1" stroke-width="22"/>

    <!-- Layer 3 — BACKEND — outline cream -->
    <rect x="-280" y="0" width="560" height="96" rx="18"
          fill="none" stroke="#E8E6E1" stroke-width="22"/>

    <!-- Layer 4 (bottom) — INFRA — teal filled -->
    <rect x="-280" y="130" width="560" height="96" rx="18"
          fill="#2DD4BF" stroke="#2DD4BF" stroke-width="22"/>

    <!-- Vertical pin through all layers -->
    <line x1="150" y1="-300" x2="150" y2="265"
          stroke="#E8E6E1" stroke-width="18" stroke-linecap="round"/>

    <!-- Pin caps -->
    <circle cx="150" cy="-300" r="26" fill="#E8E6E1"/>
    <circle cx="150" cy="265" r="26" fill="#E8E6E1"/>
  </g>
</svg>
